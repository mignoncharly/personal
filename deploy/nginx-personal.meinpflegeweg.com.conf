# Nginx (Host) – Reverse Proxy fuer die standalone App "personal" (NATIV, ohne Docker).
# Backend: Gunicorn via Unix-Socket /run/personal/gunicorn.sock
# Frontend: Next.js auf 127.0.0.1:3002
# Beeinflusst NICHT die bestehende Seite meinpflegeweg.com (eigener server-Block).
# Ablage: /etc/nginx/sites-available/personal.meinpflegeweg.com
# Diese Datei ist HTTP-only; "certbot --nginx" ergaenzt automatisch den 443-Block
# und den HTTP->HTTPS-Redirect.

upstream personal_backend {
    server unix:/run/personal/gunicorn.sock;
}
upstream personal_frontend {
    server 127.0.0.1:3002;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.personal.meinpflegeweg.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://personal.meinpflegeweg.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name personal.meinpflegeweg.com;

    client_max_body_size 20m;

    access_log /home/mignon/apps/personal/logs/nginx-access.log;
    error_log  /home/mignon/apps/personal/logs/nginx-error.log;

    # ACME-Challenge fuer Certbot (webroot-Fallback)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Statische Dateien (von Django collectstatic gesammelt)
    location /static/ {
        alias /home/mignon/apps/personal/storage/static/;
        access_log off;
        expires 30d;
    }

    # Oeffentliche Medien
    location /media/ {
        alias /home/mignon/apps/personal/storage/media/;
        access_log off;
        expires 7d;
    }

    # Backend-API -> Gunicorn (Unix-Socket)
    location /api/ {
        proxy_pass http://personal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Django-Admin -> Gunicorn (Unix-Socket)
    location /admin/ {
        proxy_pass http://personal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Hinweis: Rechnungs-PDFs werden NICHT direkt ausgeliefert, sondern nur
    # ueber den authentifizierten Endpunkt /api/invoices/{id}/pdf/.

    # Alles Uebrige -> Next.js-Frontend
    location / {
        proxy_pass http://personal_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
