# Nginx (Host) – Reverse Proxy für die standalone App "personal".
# Beeinflusst NICHT die bestehende Seite meinpflegeweg.com (eigener server-Block).
# Ablage auf dem Server: /etc/nginx/sites-available/personal.meinpflegeweg.com
# Aktivieren:  ln -s ../sites-available/personal.meinpflegeweg.com /etc/nginx/sites-enabled/

upstream personal_backend {
    server unix:/run/personal/gunicorn.sock;
}
upstream personal_frontend {
    server 127.0.0.1:3002;
}

# --- HTTP: ACME-Challenge + Redirect auf HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name www.personal.meinpflegeweg.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://personal.meinpflegeweg.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name personal.meinpflegeweg.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS www redirect ---
# Requires a certificate that includes www.personal.meinpflegeweg.com:
# certbot --nginx -d personal.meinpflegeweg.com -d www.personal.meinpflegeweg.com
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.personal.meinpflegeweg.com;

    ssl_certificate     /etc/letsencrypt/live/personal.meinpflegeweg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/personal.meinpflegeweg.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://personal.meinpflegeweg.com$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name personal.meinpflegeweg.com;

    # Zertifikate werden von Certbot angelegt/verwaltet:
    ssl_certificate     /etc/letsencrypt/live/personal.meinpflegeweg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/personal.meinpflegeweg.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    access_log /home/mignon/apps/personal/logs/nginx-access.log;
    error_log  /home/mignon/apps/personal/logs/nginx-error.log;

    # Statische Dateien (von Django gesammelt)
    location /static/ {
        alias /home/mignon/apps/personal/storage/static/;
        access_log off;
        expires 30d;
    }

    # Öffentliche Medien
    location /media/ {
        alias /home/mignon/apps/personal/storage/media/;
        access_log off;
        expires 7d;
    }

    # Backend-API + Admin -> Gunicorn
    location /api/ {
        proxy_pass http://personal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://personal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hinweis: Rechnungs-PDFs werden NICHT direkt ausgeliefert, sondern nur
    # über den authentifizierten Endpunkt /api/invoices/{id}/pdf/.

    # Alles Übrige -> Next.js-Frontend
    location / {
        proxy_pass http://personal_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
